<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="head">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input id="value-el" type="text">
            <button id="convert-btn">Convert</button>
        </div>
        <div id="content">
            <div class="conversion-container" id="length-container">
                <h3>Length (Meters/Feet)</h3>
                <p id="length-el"></p>
            </div>
            <div class="conversion-container" id="volume-container">
                <h3>Volume (Liters/Gallons)</h3>
                <p id="volume-el"></p>
            </div>
            <div class="conversion-container" id="mass-container">
                <h3>Mass (Kilograms/Pounds)</h3>
                <p id="mass-el"></p>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
